name: YouTube Notify — Discord Webhook

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore last notified video ID
        id: state
        run: |
          ID=$(gh variable get YOUTUBE_LAST_VIDEO_ID 2>/dev/null || echo "null")
          echo "last_video_id=$ID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check YouTube feed and send webhook
        id: check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LAST_VIDEO_ID: ${{ steps.state.outputs.last_video_id }}
        run: node scripts/check-youtube.mjs

      - name: Save last notified video ID
        if: steps.check.outputs.new_video_id != ''
        run: gh variable set YOUTUBE_LAST_VIDEO_ID=${{ steps.check.outputs.new_video_id }}
        env:
          GH_TOKEN: ${{ github.token }}
